<!DOCTYPE html>
<html>
<head>
  <title>Student Math Score Predictor</title>
</head>
<body>
  <h1>Student Math Score Predictor</h1>

  <form method="POST" action="/predict">
    <label>Gender:
      <select name="gender">
        <option>male</option>
        <option>female</option>
      </select>
    </label>
    <br>

    <label>Race/Ethnicity:
      <select name="race_ethnicity">
        <option>group A</option>
        <option>group B</option>
        <option>group C</option>
        <option>group D</option>
        <option>group E</option>
      </select>
    </label>
    <br>

    <label>Parental Education:
      <select name="parental_level_of_education">
        <option>some high school</option>
        <option>high school</option>
        <option>some college</option>
        <option>associate's degree</option>
        <option>bachelor's degree</option>
        <option>master's degree</option>
      </select>
    </label>
    <br>

    <label>Lunch:
      <select name="lunch">
        <option>standard</option>
        <option>free/reduced</option>
      </select>
    </label>
    <br>

    <label>Test Preparation:
      <select name="test_preparation_course">
        <option>none</option>
        <option>completed</option>
      </select>
    </label>
    <br>

    <!-- вот здесь меняем подписи -->
    <label>Reading Score (out of 100):
      <input type="number" name="reading_score" min="0" max="100">
    </label>
    <br>

    <label>Writing Score (out of 100):
      <input type="number" name="writing_score" min="0" max="100">
    </label>
    <br>

    <button type="submit">Predict</button>
  </form>

  {% if prediction is not none %}
    <h2>Predicted Math Score: {{ prediction }}</h2>
  {% endif %}
</body>
</html>
